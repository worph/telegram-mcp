services:
  telegram-mcp:
    build: .
    container_name: telegram-mcp
    ports:
      - "8088:8080"
    volumes:
      - ./data:/app/data:rw
    environment:
      - NODE_ENV=production
      - BASE_URL=http://localhost:8088
      # - BASE_URL=http://your-domain.com:8088  # For production
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    external: true
