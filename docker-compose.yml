services:
  telegram-mcp:
    build: .
    container_name: telegram-mcp
    hostname: telegrammcp
    ports:
      - "9634:9634"
    volumes:
      - ./data:/app/data:rw
    environment:
      - NODE_ENV=production
      - DISCOVERY_PORT=9099
      - MCP_PORT=9634
      # - PUBLIC_URL=https://your-domain.com  # Set to enable webhook mode automatically
    restart: unless-stopped
    networks:
      - mcp-network
      - mcp-net

# Shared networks — create with: docker network create mcp-network && docker network create mcp-net
networks:
  mcp-network:
    external: true
  mcp-net:
    external: true
