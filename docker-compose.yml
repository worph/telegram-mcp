services:
  telegram-mcp:
    build: .
    container_name: telegram-mcp
    hostname: telegrammcp
    ports:
      - "9634:9634"
    volumes:
      - ./data:/app/data:rw
    environment:
      - NODE_ENV=production
      # - PUBLIC_URL=https://your-domain.com  # External/public URL (for clients outside Docker network)
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    external: true
