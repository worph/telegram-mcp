services:
  telegram-mcp:
    build: .
    container_name: telegram-mcp
    hostname: telegrammcp
    ports:
      - "9634:9634"
    volumes:
      - ./data:/app/data:rw
    environment:
      - NODE_ENV=production
      - BASE_URL=http://telegrammcp:9634
      # - BASE_URL=http://your-domain.com:8088  # For production
      # - PUBLIC_URL=https://telegrammcp-holyhorse.nsl.sh  # For webhook mode
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    external: true
