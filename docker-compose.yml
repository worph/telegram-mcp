services:
  telegram-mcp:
    build: .
    container_name: telegram-mcp
    ports:
      - "8088:8080"
    volumes:
      - ./config.json:/app/config.json:rw
    environment:
      - NODE_ENV=production
      - CONFIG_PATH=/app/config.json
      - BASE_URL=http://localhost:8088
      # - BASE_URL=http://your-domain.com:8088  # For production
    restart: unless-stopped
